<script>
async function salvarServico() {

    const titulo = document.getElementById("titulo").value;
    const descricao = document.getElementById("descricao").value;
    const valor = document.getElementById("valor").value;

    const novoServico = {
        id: Date.now(),
        titulo,
        descricao,
        valor,
        status: "disponivel"
    };

    const url = "https://api.github.com/repos/jfbj54-arch/rs-connect/contents/servicos.json";

    const resposta = await fetch(url);
    const dados = await resposta.json();
    const conteudoAtual = JSON.parse(atob(dados.content));

    conteudoAtual.servicos.push(novoServico);

    const novoConteudo = btoa(JSON.stringify(conteudoAtual, null, 2));

    await fetch(url, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer ghp_eff36nPnD015VgzNW3FjNaB2mcUJo2h7P4L"
        },
        body: JSON.stringify({
            message: "Novo serviço adicionado",
            content: novoConteudo,
            sha: dados.sha
        })
    });

    alert("Serviço cadastrado com sucesso!");
}
</script>
