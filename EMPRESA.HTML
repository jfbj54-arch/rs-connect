<!DO<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RS CONNECT - Empresa</title>
<style>
body { font-family: Arial; padding: 20px; }
input, textarea { width: 100%; padding: 10px; margin: 10px 0; }
button { padding: 10px; background: green; color: white; border: none; cursor: pointer; }
</style>
</head>
<body>

<h2>Cadastro de Serviço</h2>

<input id="titulo" placeholder="Título do serviço">
<textarea id="descricao" placeholder="Descrição do serviço"></textarea>
<input id="valor" placeholder="Valor do serviço">

<button onclick="salvarServico()">Salvar Serviço</button>

<script>
async function salvarServico() {
    const titulo = document.getElementById("titulo").value;
    const descricao = document.getElementById("descricao").value;
    const valor = document.getElementById("valor").value;

    const novoServico = {
        id: Date.now(),
        titulo,
        descricao,
        valor,
        status: "disponivel"
    };

    const url = "https://api.github.com/repos/jfbj54-arch/rs-connect/contents/servicos.json";

    const resposta = await fetch(url);
    const dados = await resposta.json();
    const conteudoAtual = JSON.parse(atob(dados.content));

    conteudoAtual.servicos.push(novoServico);

    const novoConteudo = btoa(JSON.stringify(conteudoAtual, null, 2));

    await fetch(url, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer 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"
        },
        body: JSON.stringify({
            message: "Novo serviço adicionado",
            content: novoConteudo,
            sha: dados.sha
        })
    });

    alert("Serviço cadastrado com sucesso!");
}
</script>

</body>
</html>
