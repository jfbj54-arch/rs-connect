as<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>RS CONNECT - Empresa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0a66c2;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #084d94;
    }

    .info {
      font-size: 13px;
      margin-top: 10px;
      color: #555;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Cadastro de Serviço</h2>

  <input id="titulo" placeholder="Título do serviço">
  <textarea id="descricao" placeholder="Descrição do serviço"></textarea>
  <input id="valor" placeholder="Valor (ex: 250)">

  <button onclick="cadastrar()">Cadastrar Serviço</button>

  <div class="info">
    Após clicar, você será direcionado ao GitHub para confirmar o cadastro.
  </div>
</div>

<script>
function cadastrar() {
  const titulo = document.getElementById("titulo").value.trim();
  const descricao = document.getElementById("descricao").value.trim();
  const valor = document.getElementById("valor").value.trim();

  if (!titulo || !descricao || !valor) {
    alert("Preencha todos os campos.");
    return;
  }

  alert(
    "Você será redirecionado para o GitHub.\n\n" +
    "No GitHub:\n" +
    "1) Clique em RUN WORKFLOW\n" +
    "2) Preencha os campos com os dados\n" +
    "3) Confirme\n"
  );

  // 👉 AJUSTE para o seu repositório
  const workflowURL =
    "https://github.com/jfbj54-arch/rs-connect/actions/workflows/servicos.yml";

  window.open(workflowURL, "_blank");
}
</script>

</body>
</html>
