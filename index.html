<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>RS CONNECT - Trabalhador</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      border-left: 6px solid #28a745;
    }

    .card h3 {
      margin: 0 0 10px;
    }

    .valor {
      font-weight: bold;
      color: #0a66c2;
      margin: 8px 0;
    }

    .status {
      font-size: 13px;
      color: #28a745;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 4px;
      background: #28a745;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #218838;
    }

    .info {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

<h1>Serviços Disponíveis</h1>

<div id="lista" class="grid"></div>

<div class="info">
  Ao aceitar um serviço, você será direcionado ao GitHub para confirmar.
</div>

<script>
  // 🔧 CONFIRME SEU USUÁRIO E REPOSITÓRIO
  const SERVICOS_URL =
    "https://raw.githubusercontent.com/jfbj54-arch/rs-connect/main/servicos.json";

  const WORKFLOW_URL =
    "https://github.com/jfbj54-arch/rs-connect/actions/workflows/servicos.yml";

  async function carregarServicos() {
    const resposta = await fetch(SERVICOS_URL);
    const dados = await resposta.json();

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    const disponiveis = dados.servicos.filter(
      servico => servico.status === "disponivel"
    );

    if (disponiveis.length === 0) {
      lista.innerHTML = "<p>Nenhum serviço disponível no momento.</p>";
      return;
    }

    disponiveis.forEach(servico => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h3>${servico.titulo}</h3>
        <p>${servico.descricao}</p>
        <div class="valor">R$ ${servico.valor}</div>
        <div class="status">Status: Disponível</div>
        <button onclick="aceitar(${servico.id})">
          Aceitar Serviço
        </button>
      `;

      lista.appendChild(card);
    });
  }

  function aceitar(id) {
    alert(
      "Você será direcionado ao GitHub.\n\n" +
      "No GitHub:\n" +
      "1) Clique em RUN WORKFLOW\n" +
      "2) Preencha:\n" +
      "   acao = aceitar\n" +
      "   id = " + id + "\n" +
      "3) Confirme"
    );

    window.open(WORKFLOW_URL, "_blank");
  }

  carregarServicos();
</script>

</body>
</html>
