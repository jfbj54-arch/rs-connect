<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RS CONNECT - Trabalhador</title>
<style>
body { font-family: Arial; padding: 20px; }
.servico {
    border: 1px solid #ccc;
    padding: 15px;
    margin: 10px 0;
    border-radius: 5px;
}
button {
    padding: 10px;
    background: blue;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>
<body>

<h2>Serviços Disponíveis</h2>
<div id="lista"></div>

<script>
const url = "https://api.github.com/repos/jfbj54-arch/rs-connect/contents/servicos.json";

async function carregarServicos() {
    const resposta = await fetch(url);
    const dados = await resposta.json();
    const conteudo = JSON.parse(atob(dados.content));

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    conteudo.servicos
        .filter(s => s.status === "disponivel")
        .forEach(servico => {
            const div = document.createElement("div");
            div.className = "servico";
            div.innerHTML = `
                <h3>${servico.titulo}</h3>
                <p>${servico.descricao}</p>
                <p><strong>Valor:</strong> R$ ${servico.valor}</p>
                <button onclick="aceitar(${servico.id})">Aceitar Serviço</button>
            `;
            lista.appendChild(div);
        });
}

async function aceitar(id) {
    const resposta = await fetch(url);
    const dados = await resposta.json();
    const conteudo = JSON.parse(atob(dados.content));

    const servico = conteudo.servicos.find(s => s.id === id);
    servico.status = "aceito";

    const novoConteudo = btoa(JSON.stringify(conteudo, null, 2));

    await fetch(url, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer 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"
        },
        body: JSON.stringify({
            message: "Serviço aceito pelo trabalhador",
            content: novoConteudo,
            sha: dados.sha
        })
    });

    alert("Serviço aceito com sucesso!");
    carregarServicos();
}

carregarServicos();
</script>

</body>
</html>
